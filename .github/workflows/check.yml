name: Check

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check
  cancel-in-progress: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests
        run: npm test

      - name: Verify required files
        run: |
          test -f README.md
          test -f index.html
          test -f docs/index.html
          test -f docs/grandpa-niu.html
          test -f docs/redirect.html
          test -f docs/data/modules.json
          test -f modules/script-hub-grandpaniu.sgmodule
          test -f scripts/script-hub-grandpaniu-enhance.js
          test -f .github/workflows/check.yml
          test -f .github/workflows/site.yml

      - name: Upload site files artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-files
          path: docs

      - name: Write summary
        run: |
          {
            echo "## Check completed"
            echo ""
            echo "Files and tests passed."
            echo ""
            echo "Use this site entry while GitHub Pages is not enabled:"
            echo "https://raw.githack.com/GrandpaNiuu/Script-Hub-Grandpaniu/main/docs/index.html"
          } >> "$GITHUB_STEP_SUMMARY"
