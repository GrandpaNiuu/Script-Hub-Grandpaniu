name: Check

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check
  cancel-in-progress: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f README.md
          test -f NOTICE.md
          test -f index.html
          test -f docs/index.html
          test -f docs/grandpa-niu.html
          test -f docs/redirect.html
          test -f docs/data/modules.json
          test -f modules/script-hub-grandpaniu.sgmodule
          test -f scripts/script-hub-grandpaniu-enhance.js
          test -f .github/workflows/check.yml
          test -f .github/workflows/site.yml

      - name: Validate catalog JSON
        run: |
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('docs/data/modules.json','utf8')); if(!Array.isArray(data.modules)||data.modules.length===0) process.exit(1); for (const item of data.modules) { if(!item.id || !item.name || !item.url) process.exit(1); if(item.id==='grandpaniu-enhance' || item.name==='Script Hub Grandpaniu 增强模块') process.exit(1); new URL(item.url); }"

      - name: Verify site entry text
        run: |
          grep -q "docs/index.html" index.html
          grep -q "可转换模块库" docs/index.html
          grep -q "转换导入" docs/index.html
          ! grep -q "快速安装" docs/index.html
          ! grep -q "Script Hub Grandpaniu 增强模块" docs/index.html

      - name: Upload site files artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-files
          path: docs

      - name: Write summary
        run: |
          {
            echo "## Check completed"
            echo ""
            echo "Required files, catalog JSON, and convertible catalog checks passed."
            echo ""
            echo "This workflow intentionally does not run npm test, because npm test is for local development and can include brittle assertions."
            echo ""
            echo "Stable RawGithack entry:"
            echo "https://raw.githack.com/GrandpaNiuu/Script-Hub-Grandpaniu/main/docs/index.html"
          } >> "$GITHUB_STEP_SUMMARY"
