<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>正在跳转到 Shadowrocket</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e5e7eb}
    main{max-width:680px;margin:0 auto;padding:40px 20px}
    a,button{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 16px;border-radius:10px;border:0;background:#22c55e;color:#052e16;font-weight:700;text-decoration:none}
    code{display:block;margin:16px 0;padding:12px;border-radius:8px;background:#111827;color:#93c5fd;word-break:break-all}
    p{line-height:1.7;color:#cbd5e1}
  </style>
</head>
<body>
  <main>
    <h1>正在跳转到 Shadowrocket</h1>
    <p>如果没有自动打开，请点击下面的按钮。</p>
    <p><a id="open" href="#">打开 Shadowrocket</a></p>
    <code id="target"></code>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const target = params.get("url") || "";
    const open = document.getElementById("open");
    document.getElementById("target").textContent = target || "缺少 url 参数";
    if (target) {
      open.href = target;
      setTimeout(() => location.href = target, 250);
    } else {
      open.style.display = "none";
    }
  </script>
</body>
</html>
