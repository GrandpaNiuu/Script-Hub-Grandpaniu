<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>正在打开 Shadowrocket</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b1120;color:#e5e7eb}
    main{max-width:760px;margin:0 auto;padding:42px 20px;text-align:center}
    h1{font-size:26px;margin:0 0 10px}p{line-height:1.7;color:#cbd5e1}
    a,button{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 18px;border-radius:10px;border:0;background:#22c55e;color:#052e16;text-decoration:none;font-weight:900;margin:6px;cursor:pointer}
    button.secondary,a.secondary{background:#1f2937;color:#dbeafe;border:1px solid #243044}
    code{display:block;text-align:left;margin:18px 0;padding:12px;border-radius:10px;background:#111827;color:#93c5fd;word-break:break-all}
    .notice{border:1px solid #334155;border-radius:10px;background:#0f172a;padding:12px;margin:18px 0;text-align:left}
  </style>
</head>
<body>
  <main>
    <h1>正在打开 Shadowrocket</h1>
    <p>页面会自动尝试拉起 Shadowrocket 导入 Script Hub Grandpaniu 增强模块。</p>
    <p><a id="install" href="shadowrocket://install?module=https%3A%2F%2Fraw.githubusercontent.com%2FGrandpaNiuu%2FScript-Hub-Grandpaniu%2Fmain%2Fmodules%2Fscript-hub-grandpaniu.sgmodule">再次打开 Shadowrocket</a></p>
    <p><button class="secondary" id="copy">复制安装链接</button><a class="secondary" href="index.html">返回完整工具网站</a></p>
    <div class="notice">
      <strong>说明：</strong><br>
      自动跳转只能帮你拉起 Shadowrocket。iOS 和 Shadowrocket 的确认导入弹窗无法被网页绕过，需要你手动确认一次。
    </div>
    <code id="url"></code>
  </main>
  <script>
    const installUrl = "shadowrocket://install?module=https%3A%2F%2Fraw.githubusercontent.com%2FGrandpaNiuu%2FScript-Hub-Grandpaniu%2Fmain%2Fmodules%2Fscript-hub-grandpaniu.sgmodule";
    const urlEl = document.getElementById("url");
    const installEl = document.getElementById("install");
    urlEl.textContent = installUrl;
    installEl.href = installUrl;
    function openShadowrocket() {
      location.href = installUrl;
    }
    document.getElementById("copy").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(installUrl);
        document.getElementById("copy").textContent = "已复制";
      } catch {
        prompt("复制下面链接", installUrl);
      }
    });
    window.addEventListener("load", () => {
      setTimeout(openShadowrocket, 300);
    });
  </script>
</body>
</html>
